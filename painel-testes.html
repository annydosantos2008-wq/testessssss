<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambiente de Testes - Nexus</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            background: linear-gradient(180deg, #060b19 0%, #020408 100%);
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .test-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.07);
            padding: 30px;
            border-radius: 24px;
            max-width: 450px;
            width: 100%;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        h2 { text-align: center; margin-bottom: 25px; font-weight: 800; letter-spacing: -0.5px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; color: #94a3b8; margin-bottom: 6px; font-weight: 600; }
        select, input {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 16px;
            border-radius: 12px;
            color: white;
            font-size: 0.95rem;
            transition: 0.2s;
        }
        select:focus, input:focus { border-color: #0052ff; background: rgba(15, 23, 42, 0.9); }
        .btn-action {
            width: 100%;
            background: #0052ff;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(0, 82, 255, 0.3);
            transition: 0.2s;
        }
        .btn-action:hover { background: #1e6eff; }
        .btn-action:active { transform: scale(0.98); }
        .footer-note { text-align: center; margin-top: 20px; font-size: 0.75rem; color: #64748b; }
    </style>
</head>
<body>

    <div class="test-container">
        <h2>Simulador de Fluxos</h2>
        
        <div class="form-group">
            <label for="select-user">Selecionar Usuário Alvo</label>
            <select id="select-user">
                <option value="">Carregando usuários ativos...</option>
            </select>
        </div>

        <div class="form-group">
            <label for="input-deposit">Valor do Depósito Simulado (R$)</label>
            <input type="number" id="input-deposit" value="50.00" min="1" step="0.01">
        </div>

        <button class="btn-action" id="btn-trigger-flow">Executar Fluxo Completo</button>
        
        <div class="footer-note">
            Este painel injeta depósitos e calcula comissões em cascata em tempo real (Nível 1, 2 e 3) com base nos parâmetros da rede.
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc, updateDoc, addDoc, Timestamp, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKDFw7khZzM9hIX7xbbrbFQeESiCLnmOw",
            authDomain: "monety-site-9175f.firebaseapp.com",
            projectId: "monety-site-9175f",
            storageBucket: "monety-site-9175f.firebasestorage.app",
            messagingSenderId: "840821848803",
            appId: "1:840821848803:web:b99a5528e4bb925518a3d6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Carrega os usuários no Dropdown ao iniciar a página
        async function carregarListaUsuarios() {
            const select = document.getElementById("select-user");
            select.innerHTML = '<option value="">Selecione um usuário...</option>';
            
            try {
                const querySnapshot = await getDocs(collection(db, "usuarios"));
                querySnapshot.forEach((docSnap) => {
                    const user = docSnap.data();
                    const option = document.createElement("option");
                    option.value = docSnap.id;
                    option.textContent = `${user.nome || 'Sem Nome'} (${user.email || 'Sem Email'})`;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error("Erro ao listar usuários:", error);
                select.innerHTML = '<option value="">Erro ao buscar banco de dados</option>';
            }
        }
        carregarListaUsuarios();

        // Listener do botão principal
        document.getElementById("btn-trigger-flow").addEventListener("click", async () => {
            const uid = document.getElementById("select-user").value;
            const valorDeposito = parseFloat(document.getElementById("input-deposit").value);

            if (!uid) return Swal.fire("Atenção", "Por favor, escolha um usuário da lista para testar.", "warning");
            if (isNaN(valorDeposito) || valorDeposito <= 0) return Swal.fire("Atenção", "Insira um valor válido de depósito.", "warning");

            Swal.fire({
                title: 'Processando fluxo...',
                text: 'Aguarde a injeção e o cálculo das indicações.',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            try {
                // 1. Coleta dados do próprio usuário selecionado
                const userRef = doc(db, "usuarios", uid);
                const userSnap = await getDoc(userRef);
                if (!userSnap.exists()) throw new Error("Usuário não localizado no sistema.");

                const userData = userSnap.data();
                const jaEraAtivo = userData.statusConta === "Ativa";

                // 2. Atualiza o saldo do usuário + Ativa a conta + ADICIONA 1 GIRO NA ROLETA
                await updateDoc(userRef, {
                    saldoLucro: increment(valorDeposito),
                    totalGanhos: increment(valorDeposito),
                    statusConta: "Ativa",
                    girosRoleta: increment(1) // Adiciona o giro ao depositar
                });

                // Cria o log de depósito direto do usuário
                await addDoc(collection(db, "historico"), {
                    userId: uid,
                    valor: valorDeposito,
                    tipo: "Depósito via PIX (Simulado)",
                    data: Timestamp.now(),
                    descricao: "Depósito inserido manualmente pelo ambiente de testes."
                });

                // Configurações das porcentagens de comissão de indicação por níveis
                const configuracaoNiveis = [
                    { nivel: 1, porcentagem: 0.10, label: "Nível 1 (Direto)" },
                    { nivel: 2, porcentagem: 0.05, label: "Nível 2 (Indireto)" },
                    { nivel: 3, porcentagem: 0.03, label: "Nível 3 (Indireto)" }
                ];

                let resumoLogs = "";
                let atualIndicadorUid = userData.indicadoPor || null;

                // 3. Varre a árvore de indicações para cima de forma dinâmica até o Nível 3
                for (const config of configuracaoNiveis) {
                    if (atualIndicadorUid) {
                        const patrocinadorRef = doc(db, "usuarios", atualIndicadorUid);
                        const patrocinadorSnap = await getDoc(patrocinadorRef);

                        if (!patrocinadorSnap.exists()) break;

                        const valorComissao = valorDeposito * config.porcentagem;
                        const dadosPatrocinador = patrocinadorSnap.data();

                        // Objeto de update padrão para o patrocinador
                        const updateData = {
                            saldoLucro: increment(valorComissao),
                            totalGanhos: increment(valorComissao)
                        };

                        // Se for Nível 1 direto e o usuário convidado não era ativo antes, incrementa o contador
                        if (!jaEraAtivo && config.nivel === 1) {
                            updateData.convidadosAtivos = increment(1);
                        }

                        await updateDoc(patrocinadorRef, updateData);

                        // Registra a comissão no extrato/histórico do patrocinador
                        await addDoc(collection(db, "historico"), {
                            userId: atualIndicadorUid,
                            valor: valorComissao,
                            tipo: `Bônus de Indicação - ${config.label}`,
                            data: Timestamp.now(),
                            descricao: `Recebido do convidado: ${userData.nome || "Usuário de Teste"}`
                        });

                        resumoLogs += `<br><b>${config.label}:</b> UID (...${atualIndicadorUid.substring(0,6)}) ganhou R$ ${valorComissao.toFixed(2)}`;
                        if (!jaEraAtivo && config.nivel === 1) {
                            resumoLogs += ` ➔ <i>Contador de Convidados Ativos aumentado!</i>`;
                        }

                        // Sobe para o próximo pai cadastrado na árvore (Uplink)
                        atualIndicadorUid = dadosPatrocinador.indicadoPor || null;
                    } else {
                        break;
                    }
                }

                Swal.fire({
                    icon: 'success',
                    title: 'Fluxo Concluído!',
                    html: `Conta do usuário foi atualizada para Ativa.<br>Depósito de R$ ${valorDeposito.toFixed(2)} injetado.<br><b style="color: #00e676">+1 Giro adicionado à roleta com sucesso!</b><br>${resumoLogs === "" ? "<br><i>Este usuário não foi indicado por ninguém (sem pai na rede).</i>" : "<br>" + resumoLogs}`,
                    background: '#060b19',
                    color: '#fff',
                    confirmButtonColor: '#0052ff'
                }).then(() => {
                    carregarListaUsuarios();
                });

            } catch (error) {
                console.error(error);
                Swal.fire("Falha na Operação", error.message, "error");
            }
        });
    </script>
</body>
</html>
