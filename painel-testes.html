<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambiente de Testes - Nexus</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            background: linear-gradient(180deg, #060b19 0%, #020408 100%);
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .test-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.07);
            padding: 30px;
            border-radius: 24px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        h2 { font-size: 1.5rem; margin-bottom: 10px; font-weight: 800; color: #ffd700; }
        p { font-size: 0.85rem; color: #94a3b8; margin-bottom: 25px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; color: #cbd5e1; font-weight: 600; display: block; margin-bottom: 8px; }
        input, select {
            width: 100%; padding: 14px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px; color: white; font-weight: 600; font-size: 0.9rem;
        }
        button {
            width: 100%; padding: 15px; background: linear-gradient(135deg, #0052ff 0%, #003db3 100%);
            border: none; border-radius: 12px; color: white; font-weight: 800; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 82, 255, 0.3); transition: 0.2s; font-size: 0.95rem; margin-top: 10px;
        }
        button:active { transform: scale(0.97); }
    </style>
</head>
<body>

    <div class="test-container">
        <h2>Simulador de Ativação 🧪</h2>
        <p>Injete depósitos fictícios para testar a ativação de usuários, comissões em 3 níveis e progressão de patentes.</p>

        <div class="form-group">
            <label>Selecione o Usuário para Depositar</label>
            <select id="select-users">
                <option value="">Carregando usuários da base...</option>
            </select>
        </div>

        <div class="form-group">
            <label>Valor do Depósito Comercial (R$)</label>
            <input type="number" id="test-amount" value="50.00" placeholder="Ex: 50.00">
        </div>

        <button id="btn-simulate">Processar Depósito e Ativar Rede</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc, updateDoc, addDoc, increment, Timestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKDFw7khZzM9hIX7xbbrbFQeESiCLnmOw",
            authDomain: "monety-site-9175f.firebaseapp.com",
            projectId: "monety-site-9175f",
            storageBucket: "monety-site-9175f.firebasestorage.app",
            messagingSenderId: "840821848803",
            appId: "1:840821848803:web:b99a5528e4bb925518a3d6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let usuarioLogadoUid = "";

        // Puxar lista de usuários para testar dinamicamente
        async function carregarListaUsuarios() {
            const select = document.getElementById('select-users');
            try {
                const snap = await getDocs(collection(db, "usuarios"));
                select.innerHTML = "";
                
                if(snap.empty) {
                    select.innerHTML = `<option value="">Nenhum usuário encontrado</option>`;
                    return;
                }

                snap.forEach(userDoc => {
                    const d = userDoc.data();
                    const status = d.ativo ? "🟢 Ativo" : "🔴 Inativo";
                    const option = document.createElement('option');
                    option.value = userDoc.id;
                    option.innerText = `${d.nome || 'Sem Nome'} (${status}) - ...${userDoc.id.substring(0,6)}`;
                    select.appendChild(option);
                });
                
                usuarioLogadoUid = select.value;
                select.addEventListener('change', (e) => { usuarioLogadoUid = e.target.value; });

            } catch (err) {
                console.error("Erro ao listar:", err);
                select.innerHTML = `<option value="">Erro ao conectar</option>`;
            }
        }
        carregarListaUsuarios();

        // SIMULAÇÃO COMPLETA E CORRIGIDA PARA MUDAR O CONVITES/ATIVOS
        document.getElementById('btn-simulate').addEventListener('click', async () => {
            const valorDeposito = parseFloat(document.getElementById('test-amount').value);
            if (!usuarioLogadoUid) {
                return Swal.fire("Atenção", "Selecione um usuário válido da lista.", "warning");
            }
            if (isNaN(valorDeposito) || valorDeposito <= 0) {
                return Swal.fire("Erro", "Insira um valor de depósito válido", "error");
            }

            Swal.fire({
                title: 'Processando Simulação...',
                text: 'Adicionando fundos, mudando status para Ativo e atualizando contadores de patrocinadores...',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            try {
                const userRef = doc(db, "usuarios", usuarioLogadoUid);
                const userSnap = await getDoc(userRef);
                
                if (!userSnap.exists()) throw new Error("Usuário alvo não localizado.");
                const userData = userSnap.data();

                // Identifica se o usuário já era ativo para evitar somar de forma duplicada na árvore
                const jaEraAtivo = userData.ativo === true;

                // 1. Atualiza finanças do usuário e crava o status dele como ativo
                await updateDoc(userRef, {
                    saldoLucro: increment(valorDeposito),
                    ativo: true
                });

                // Cria o log de histórico local
                await addDoc(collection(db, "usuarios", usuarioLogadoUid, "movimentacoes"), {
                    tipo: "Depósito via Simulador",
                    valor: valorDeposito,
                    data: new Date().getTime(),
                    descricao: "Injeção manual via ambiente de desenvolvimento"
                });

                // 2. Processa comissão e atualiza as metas da rede de indicação
                let atualIndicadorUid = userData.indicadoPor || null;
                
                const niveisConfig = [
                    { nivel: 1, porc: 0.20, label: "1ª Geração" },
                    { nivel: 2, porc: 0.05, label: "2ª Geração" },
                    { nivel: 3, porc: 0.01, label: "3ª Geração" }
                ];

                let resumoLogs = "";

                for (let i = 0; i < niveisConfig.length; i++) {
                    if (!atualIndicadorUid || atualIndicadorUid.trim() === "") break;

                    const config = niveisConfig[i];
                    const patrocinadorRef = doc(db, "usuarios", atualIndicadorUid);
                    const patrocinadorSnap = await getDoc(patrocinadorRef);

                    if (patrocinadorSnap.exists()) {
                        const valorComissao = valorDeposito * config.porc;

                        // Monta o objeto dinâmico de alteração financeira do pai
                        let alteracoesPatrocinador = {
                            saldoLucro: increment(valorComissao),
                            totalComissoes: increment(valorComissao)
                        };

                        // SE O FILHO ESTIVER PASSANDO DE INATIVO PARA ATIVO AGORA:
                        if (!jaEraAtivo) {
                            // Se for o indicador direto (Nível 1), incrementa a variável exata que o painel de metas lê!
                            if (config.nivel === 1) {
                                alteracoesPatrocinador.indicadosAtivosCount = increment(1);
                            }
                            
                            // Mantém opcionalmente outros contadores globais de rede que você use
                            alteracoesPatrocinador.ativosNaRede = increment(1);
                        }

                        // Executa a gravação no documento do patrocinador
                        await updateDoc(patrocinadorRef, alteracoesPatrocinador);

                        // Cria registro de comissão nas movimentações do patrocinador
                        await addDoc(collection(db, "usuarios", atualIndicadorUid, "movimentacoes"), {
                            tipo: `Comissão ${config.label}`,
                            valor: valorComissao,
                            data: new Date().getTime(),
                            descricao: `Recebido do convidado: ${userData.nome || "Usuário de Teste"}`
                        });

                        resumoLogs += `<br><b>${config.label}:</b> UID (...${atualIndicadorUid.substring(0,6)}) ganhou R$ ${valorComissao.toFixed(2)}`;
                        if (!jaEraAtivo && config.nivel === 1) {
                            resumoLogs += ` ➔ <i>Contador de Convidados Ativos aumentado!</i>`;
                        }

                        // Sobe para o próximo pai cadastrado na árvore
                        atualIndicadorUid = patrocinadorSnap.data().indicadoPor || null;
                    } else {
                        break;
                    }
                }

                Swal.fire({
                    icon: 'success',
                    title: 'Fluxo Concluído!',
                    html: `Conta do usuário foi atualizada para Ativa.<br>Depósito de R$ ${valorDeposito.toFixed(2)} injetado.${resumoLogs === "" ? "<br><br><i>Este usuário não foi indicado por ninguém (sem pai na rede).</i>" : "<br>" + resumoLogs}`,
                    background: '#060b19',
                    color: '#fff',
                    confirmButtonColor: '#0052ff'
                }).then(() => {
                    carregarListaUsuarios();
                });

            } catch (error) {
                console.error(error);
                Swal.fire("Falha na Operação", error.message, "error");
            }
        });
    </script>
</body>
</html>
